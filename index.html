<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Hacker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="terminal-shell">
    <header class="top-panel">
      <h1>Mind Hacker</h1>
      <p class="subtitle">Crack logic firewalls. Breach all security levels.</p>
      <div class="stats-row">
        <div class="stat-box">
          <span>Level</span>
          <strong id="levelValue">1</strong>
        </div>
        <div class="stat-box">
          <span>Score</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="stat-box">
          <span>Accuracy</span>
          <strong id="accuracyValue">0%</strong>
        </div>
        <div class="stat-box timer-box">
          <span>Timer</span>
          <strong id="timerValue">30s</strong>
        </div>
      </div>
      <div class="progress-track" aria-label="Level progress">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </header>

    <section id="puzzleCard" class="puzzle-card">
      <p id="puzzleType" class="puzzle-type">Binary Conversion</p>
      <h2 id="puzzlePrompt">Convert decimal 12 to binary.</h2>
      <p id="puzzleHint" class="hint-text"></p>

      <form id="answerForm" class="answer-form" autocomplete="off">
        <label for="answerInput">Enter access key</label>
        <div class="answer-row">
          <input id="answerInput" type="text" placeholder="type answer here" required>
          <button id="submitBtn" type="submit">Inject</button>
        </div>
      </form>

      <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      <div class="actions-row">
        <button id="nextBtn" type="button" class="hidden">Next Level</button>
        <button id="restartBtn" type="button" class="ghost">Restart Mission</button>
      </div>
    </section>

    <section class="log-card">
      <h3>System Log</h3>
      <ul id="logList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
